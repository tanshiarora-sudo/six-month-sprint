<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanshi's 6-Month Sprint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="logo">
        <svg viewBox="0 0 100 100" width="36" height="36" aria-label="Fluff">
          <defs><radialGradient id="logoGrad" cx="38%" cy="28%" r="85%">
            <stop offset="0%" stop-color="#b79bef"/><stop offset="60%" stop-color="#8f6fdd"/><stop offset="100%" stop-color="#6a4cc2"/>
          </radialGradient></defs>
          <path d="M42 13 q-1 -8 5 -11 q1 6 4 8 Z" fill="#8f6fdd"/>
          <path d="M53 11 q2 -8 8 -9 q-1 6 1 9 Z" fill="#9d7ee4"/>
          <circle cx="50" cy="54" r="40" fill="url(#logoGrad)"/>
          <ellipse cx="37" cy="50" rx="8" ry="9.5" fill="#221d38"/>
          <ellipse cx="63" cy="50" rx="8" ry="9.5" fill="#221d38"/>
          <circle cx="34.5" cy="46" r="3" fill="#fff"/>
          <circle cx="60.5" cy="46" r="3" fill="#fff"/>
          <path d="M42 68 Q50 76 58 68" fill="none" stroke="#352a57" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="title">
        <h1>Tanshi's 6-Month Sprint</h1>
        <p>CAT 2026 + health · consistent actions create consistent results.</p>
      </div>
      <div class="spacer"></div>
      <div class="top-actions">
        <button class="btn" id="backupBtn" data-act="backup" style="display:none">Backup</button>
        <button class="btn" data-act="export">⬇ Export</button>
        <button class="btn" data-act="import">⬆ Import</button>
        <button class="btn danger" data-act="reset">Reset</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="study">Study</button>
      <button class="tab" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="reports">Reports</button>
    </nav>

    <main id="view"></main>

    <footer class="footer">Tanshi's 6-Month Sprint · all data stays in your browser (localStorage) · Export regularly</footer>
  </div>

  <input type="file" id="importFile" accept="application/json" style="display:none">
  <div id="toast"></div>

  <script src="foods.js"></script>
  <script src="core.js"></script>
  <script src="backup.js"></script>
  <script src="mascot.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
